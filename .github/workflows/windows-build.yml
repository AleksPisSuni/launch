name: Build & Release LaunchpadX

on:
  push:
    branches: [ main, master ]
    tags:   [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & package (win-x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        working-directory: app_win/LaunchpadX
        run: dotnet restore

      - name: Build (Debug check)
        working-directory: app_win/LaunchpadX
        run: dotnet build -c Debug --no-restore

      - name: Publish self-contained release
        working-directory: app_win/LaunchpadX
        run: >
          dotnet publish -c Release -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        working-directory: app_win/LaunchpadX
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          if (-not $version -or $version -eq '${{ github.ref_name }}') { $version = '1.0.0' }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss /DMyAppVersion=$version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: LaunchpadX-portable
          path: app_win/LaunchpadX/publish/LaunchpadX.exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: LaunchpadX-installer
          path: app_win/LaunchpadX/installer/LaunchpadX-Setup-*.exe

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download portable exe
        uses: actions/download-artifact@v4
        with:
          name: LaunchpadX-portable
          path: release/

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: LaunchpadX-installer
          path: release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/LaunchpadX-Setup-*.exe
            release/LaunchpadX.exe
          generate_release_notes: true
          body: |
            ## Installation

            | File | Description |
            |---|---|
            | `LaunchpadX-Setup-*.exe` | **Recommended** — installs with Start Menu shortcut and uninstaller |
            | `LaunchpadX.exe` | Portable — run from anywhere, no install needed |

            **Requirements:** Windows 10/11 x64, Novation Launchpad X connected via USB.
